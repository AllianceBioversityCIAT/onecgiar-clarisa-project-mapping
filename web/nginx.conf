server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Upload size cap — must exceed the API's per-file limit (20 MB) and cover
    # bulk imports of up to 10 files. Default nginx cap is 1 MB and was rejecting
    # importer uploads with a 413/500 page BEFORE the request reached the API, so
    # the error never appeared in the NestJS logs. Keep this generous.
    client_max_body_size 250M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API reverse proxy — strips /api prefix before forwarding to backend
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Stream the request body straight to the upstream — avoids buffering
        # large importer uploads to disk inside nginx.
        proxy_request_buffering off;
        # Long timeouts for bulk Anaplan/CSV imports — sequential file processing
        # (TOC + 4.1 + 4.3 + Signalling) routinely exceeds the 60s nginx default.
        proxy_connect_timeout 600s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    # WebSocket reverse proxy — passes /ws/* through unchanged so the
    # NestJS Socket.IO gateway can handshake on /ws/negotiation.
    location /ws/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Angular SPA routing — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
