<!-- ===== Header — matching risk.cgiar.org exactly ===== -->
<header class="header-risk">
  <div class="header-risk__content">

    <!-- Branding: logo + title + nav pills -->
    <div class="header-branding">
      <div class="header-content-box">
        <div class="header-content-box--1">
          <img src="assets/cgiar-logo.svg" class="header-logo-size" alt="CGIAR Logo" />
        </div>
        <div class="header-content-box--2">
          <p class="header-content-box--2__title">
            <span class="header-content-box--2__title--1">PRMS</span> Projects Registry
          </p>
        </div>
      </div>

      <!-- Nav pills -->
      <nav class="header-risk__main-nav">
        <ul class="main-nav-list">
          @for (item of navItems(); track item.path) {
            @if (!item.adminOnly || authService.isAdmin()) {
              <li>
                <a [routerLink]="item.path"
                   routerLinkActive="active"
                   [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
                   class="main-nav-link">
                  <span>{{ item.label }}</span>
                </a>
              </li>
            }
          }
        </ul>
      </nav>
    </div>

    <!-- User nav (right side) -->
    @if (authService.isAuthenticated()) {
      <nav class="header-user-nav-box">
        <button class="user-nav-button" type="button">
          <span class="user-nav-button__visible">
            <i class="pi pi-user user-nav-button__icon"></i>
            <span class="user-nav-button__title">{{ userDisplayName() }}</span>
          </span>
        </button>
        <button class="user-nav-button" type="button" (click)="logout()" aria-label="Sign out">
          <span class="user-nav-button__title">Logout</span>
          <img src="assets/icon-logout.svg" class="user-nav-button__icon-img" alt="Logout" />
        </button>
      </nav>
    }

  </div>
</header>

<!-- Content area -->
<main class="content">
  <router-outlet />
</main>
