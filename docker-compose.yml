services:
  mysql:
    image: mysql:8.0
    container_name: prms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prms_projects
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: prms-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '8080:80'
    depends_on:
      mysql:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: prms-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DATABASE: prms_projects
      CORS_ORIGIN: http://localhost:4200
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    command: npm run start:dev

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: prms-web
    restart: unless-stopped
    ports:
      - '4200:4200'
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm start

volumes:
  mysql_data:
