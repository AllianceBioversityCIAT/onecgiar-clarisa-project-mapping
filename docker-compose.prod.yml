services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    restart: always
    environment:
      NODE_ENV: production
      LOG_FORMAT: json
    env_file:
      - ./api/.env
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - '80:80'
    depends_on:
      - api

volumes:
  mysql_data:
